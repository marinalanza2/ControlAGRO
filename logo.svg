<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background -->
  <rect width="1024" height="1024" rx="0" fill="#14532d"/>

  <!-- Leaf shape - stylized agro symbol -->
  <g transform="translate(512, 480)">
    <!-- Main leaf -->
    <path d="M0,-260 C140,-260 260,-140 260,0 C260,80 220,155 160,200 C120,228 70,245 0,245 C-70,245 -120,228 -160,200 C-220,155 -260,80 -260,0 C-260,-140 -140,-260 0,-260Z" fill="#166534" opacity="0.3"/>

    <!-- Inner leaf highlight -->
    <path d="M0,-200 C108,-200 200,-108 200,0 C200,62 170,120 124,155 C93,176 54,190 0,190 C-54,190 -93,176 -124,155 C-170,120 -200,62 -200,0 C-200,-108 -108,-200 0,-200Z" fill="#166534" opacity="0.4"/>

    <!-- Leaf vein - center -->
    <line x1="0" y1="-180" x2="0" y2="170" stroke="#22c55e" stroke-width="4" opacity="0.5"/>
    <!-- Leaf veins - left -->
    <line x1="0" y1="-80" x2="-100" y2="-20" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
    <line x1="0" y1="0" x2="-110" y2="50" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
    <line x1="0" y1="80" x2="-90" y2="120" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
    <!-- Leaf veins - right -->
    <line x1="0" y1="-80" x2="100" y2="-20" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
    <line x1="0" y1="0" x2="110" y2="50" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
    <line x1="0" y1="80" x2="90" y2="120" stroke="#22c55e" stroke-width="3" opacity="0.35"/>
  </g>

  <!-- "CA" text - bold, centered -->
  <text x="512" y="530" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="280" fill="#ffffff" letter-spacing="-8">CA</text>

  <!-- Small accent bar below -->
  <rect x="392" y="580" width="240" height="8" rx="4" fill="#22c55e" opacity="0.8"/>
</svg>
